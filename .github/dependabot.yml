version: 2
updates:
  # npm/pnpm dependencies across the workspace (reads pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle dev tooling into one PR to cut noise.
      dev-dependencies:
        dependency-type: development

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
