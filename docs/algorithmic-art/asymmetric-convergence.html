<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asymmetric Convergence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%); min-height: 100vh; color: var(--anthropic-dark); }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar { width: 320px; flex-shrink: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(20,20,19,0.1); overflow-y: auto; overflow-x: hidden; }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '\2022'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: #0a0a12; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); padding: 100px; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Asymmetric Convergence</h1>
            <div class="subtitle">Capital flows through distress toward hidden value. Particles navigate turbulence; only those with margin of safety reach convergence.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&larr; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &rarr;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="6000" step="250" value="3000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">3000</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0.001" max="0.012" step="0.001" value="0.005" oninput="updateParam('turbulence', this.value)">
                        <span class="value-display" id="turbulence-value">0.005</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Attractor Strength</label>
                    <div class="slider-container">
                        <input type="range" id="attractorStrength" min="0.1" max="3.0" step="0.1" value="1.2" oninput="updateParam('attractorStrength', this.value)">
                        <span class="value-display" id="attractorStrength-value">1.2</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Attractor Count</label>
                    <div class="slider-container">
                        <input type="range" id="attractorCount" min="2" max="9" step="1" value="5" oninput="updateParam('attractorCount', this.value)">
                        <span class="value-display" id="attractorCount-value">5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Trail Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailOpacity" min="5" max="60" step="5" value="20" oninput="updateParam('trailOpacity', this.value)">
                        <span class="value-display" id="trailOpacity-value">20</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Recovery Speed</label>
                    <div class="slider-container">
                        <input type="range" id="recoverySpeed" min="0.002" max="0.02" step="0.002" value="0.008" oninput="updateParam('recoverySpeed', this.value)">
                        <span class="value-display" id="recoverySpeed-value">0.008</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="downloadArt()">Download</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing convergence field...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            particleCount: 3000,
            turbulence: 0.005,
            attractorStrength: 1.2,
            attractorCount: 5,
            trailOpacity: 20,
            recoverySpeed: 0.008
        };
        let defaultParams = {...params};

        let particles = [];
        let attractors = [];
        let frameNum = 0;
        let pg; // offscreen graphics for trail accumulation

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pg = createGraphics(1200, 1200);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            frameNum = 0;

            // Clear trail buffer
            pg.background(10, 10, 18);

            // Generate attractors — hidden wells of intrinsic value
            attractors = [];
            for (let i = 0; i < params.attractorCount; i++) {
                attractors.push({
                    x: random(width * 0.15, width * 0.85),
                    y: random(height * 0.15, height * 0.85),
                    strength: random(0.6, 1.4) * params.attractorStrength,
                    radius: random(80, 200)
                });
            }

            // Birth particles at edges and scattered — capital entering the distressed field
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle(i));
            }

            background(10, 10, 18);
        }

        function draw() {
            frameNum++;

            // Sigmoid recovery curve — attractors strengthen over time
            let recoveryPhase = 1.0 / (1.0 + Math.exp(-params.recoverySpeed * (frameNum - 300)));

            // Subtle background fade for trail persistence
            pg.noStroke();
            pg.fill(10, 10, 18, 2);
            pg.rect(0, 0, width, height);

            for (let p of particles) {
                p.update(recoveryPhase);
                p.display();
            }

            // Render accumulated trails
            image(pg, 0, 0);

            // Draw bright convergence nodes where attractors are (subtle glow)
            for (let a of attractors) {
                let glowAlpha = map(recoveryPhase, 0, 1, 0, 30);
                noStroke();
                for (let r = a.radius; r > 0; r -= 10) {
                    fill(218, 165, 80, glowAlpha * (1 - r / a.radius));
                    ellipse(a.x, a.y, r * 2 * recoveryPhase);
                }
            }

            // Stop after sufficient evolution
            if (frameNum > 800) noLoop();
        }

        class Particle {
            constructor(index) {
                // Spawn from edges or scattered — representing capital entering distressed markets
                let spawnType = random();
                if (spawnType < 0.3) {
                    // Edge spawn
                    let edge = floor(random(4));
                    if (edge === 0) { this.x = random(width); this.y = 0; }
                    else if (edge === 1) { this.x = width; this.y = random(height); }
                    else if (edge === 2) { this.x = random(width); this.y = height; }
                    else { this.x = 0; this.y = random(height); }
                } else {
                    // Scattered spawn — already in the noise field
                    this.x = random(width);
                    this.y = random(height);
                }

                this.vx = random(-1, 1);
                this.vy = random(-1, 1);
                this.age = 0;
                this.maxAge = random(400, 800);
                this.index = index;

                // Margin of safety — initial momentum toward attractors
                // Higher values survive longer through turbulence
                this.marginOfSafety = random(0.3, 1.0);
                this.survived = true;
                this.prevX = this.x;
                this.prevY = this.y;
            }

            update(recoveryPhase) {
                if (!this.survived) return;

                this.prevX = this.x;
                this.prevY = this.y;
                this.age++;

                // Turbulence — layered Perlin noise (the market chaos)
                let noiseVal = noise(
                    this.x * params.turbulence,
                    this.y * params.turbulence,
                    frameNum * 0.003
                );
                let noiseAngle = noiseVal * TWO_PI * 4;

                // Secondary noise octave — counter-currents, false signals
                let noise2 = noise(
                    this.x * params.turbulence * 2.5 + 500,
                    this.y * params.turbulence * 2.5 + 500,
                    frameNum * 0.005
                );
                let counterAngle = noise2 * TWO_PI * 2;

                // Turbulence force (decreases as recovery progresses)
                let turbulenceForce = (1.0 - recoveryPhase * 0.6);
                this.vx += cos(noiseAngle) * turbulenceForce * 0.8;
                this.vy += sin(noiseAngle) * turbulenceForce * 0.8;

                // Counter-current (false signals — dead cat bounces)
                this.vx += cos(counterAngle) * 0.2 * (1 - recoveryPhase);
                this.vy += sin(counterAngle) * 0.2 * (1 - recoveryPhase);

                // Attractor force — intrinsic value pulling capital toward convergence
                for (let a of attractors) {
                    let dx = a.x - this.x;
                    let dy = a.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < a.radius * 3) {
                        let force = a.strength * recoveryPhase * this.marginOfSafety / (dist * 0.1 + 10);
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }
                }

                // Damping
                this.vx *= 0.95;
                this.vy *= 0.95;

                // Speed limit
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 4) {
                    this.vx = (this.vx / speed) * 4;
                    this.vy = (this.vy / speed) * 4;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Particles that exit the field are lost — boundary death
                if (this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20) {
                    this.survived = false;
                }

                // Age death — investment thesis expired
                if (this.age > this.maxAge) {
                    this.survived = false;
                }
            }

            display() {
                if (!this.survived) return;

                // Color encodes conviction journey
                // Cold uncertainty (indigo) -> warm convergence (amber/gold)
                let convictionProgress = this.age / this.maxAge;
                let nearestAttractorDist = Infinity;
                for (let a of attractors) {
                    let d = dist(this.x, this.y, a.x, a.y);
                    if (d < nearestAttractorDist) nearestAttractorDist = d;
                }
                let proximity = constrain(map(nearestAttractorDist, 0, 300, 1, 0), 0, 1);

                // Blend from indigo through teal to amber
                let t = convictionProgress * 0.4 + proximity * 0.6;
                let r, g, b;
                if (t < 0.4) {
                    // Deep indigo to teal
                    let s = t / 0.4;
                    r = lerp(40, 60, s);
                    g = lerp(35, 140, s);
                    b = lerp(120, 180, s);
                } else if (t < 0.7) {
                    // Teal to warm amber
                    let s = (t - 0.4) / 0.3;
                    r = lerp(60, 218, s);
                    g = lerp(140, 165, s);
                    b = lerp(180, 80, s);
                } else {
                    // Amber to bright gold
                    let s = (t - 0.7) / 0.3;
                    r = lerp(218, 255, s);
                    g = lerp(165, 210, s);
                    b = lerp(80, 60, s);
                }

                let alpha = params.trailOpacity * this.marginOfSafety;

                // Draw trail on offscreen buffer
                pg.stroke(r, g, b, alpha);
                pg.strokeWeight(map(this.marginOfSafety, 0.3, 1.0, 0.5, 1.8));
                pg.line(this.prevX, this.prevY, this.x, this.y);

                // Bright point at current position for high-conviction particles near attractors
                if (proximity > 0.6 && convictionProgress > 0.3) {
                    pg.noStroke();
                    pg.fill(255, 220, 100, alpha * 1.5);
                    pg.ellipse(this.x, this.y, 2.5);
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════════════════

        function updateParam(name, value) {
            params[name] = parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            initializeSystem();
            loop();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
                loop();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
            loop();
        }

        function nextSeed() {
            params.seed++;
            updateSeedDisplay();
            initializeSystem();
            loop();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
            loop();
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence;
            document.getElementById('attractorStrength').value = params.attractorStrength;
            document.getElementById('attractorStrength-value').textContent = params.attractorStrength;
            document.getElementById('attractorCount').value = params.attractorCount;
            document.getElementById('attractorCount-value').textContent = params.attractorCount;
            document.getElementById('trailOpacity').value = params.trailOpacity;
            document.getElementById('trailOpacity-value').textContent = params.trailOpacity;
            document.getElementById('recoverySpeed').value = params.recoverySpeed;
            document.getElementById('recoverySpeed-value').textContent = params.recoverySpeed;
            updateSeedDisplay();
            initializeSystem();
            loop();
        }

        function downloadArt() {
            saveCanvas('asymmetric-convergence-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
